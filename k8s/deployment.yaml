apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-tracker-app
  labels:
    app: trend-tracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trend-tracker
  template:
    metadata:
      labels:
        app: trend-tracker
    spec:
      containers:
      - name: app
        image: trend-tracker:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: REDIS_HOST
          value: "redis-service"
        envFrom:
        - secretRef:
            name: trend-tracker-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trend-tracker-service
spec:
  type: LoadBalancer
  selector:
    app: trend-tracker
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: v1
kind: Secret
metadata:
  name: trend-tracker-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "your-openai-key"
  TWITTER_BEARER_TOKEN: "your-twitter-token"
  POSTGRES_PASSWORD: "your-postgres-password"
  JWT_SECRET: "your-jwt-secret"
